variables:
  PIPELINE:
    description: "Specify which pipeline to run"
    value: publish
    options: [publish]

stages: [publish]

include:
  - component: $OUTLOUD_CI/publish-npm@4
    inputs:
      name: openapi
      dir: packages/openapi
      script:
        - ( cd ../generator && pnpm run build )
        - pnpm run build

  - component: $OUTLOUD_CI/publish-npm@4
    inputs:
      name: generator
      dir: packages/generator
      notify: false
